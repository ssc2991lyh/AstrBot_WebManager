name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_body: ${{ steps.build-release-body.outputs.release_body }}
    steps:
      - id: build-release-body
        name: Build bilingual release body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = context.ref.startsWith('refs/tags/')
              ? context.ref.slice('refs/tags/'.length)
              : context.ref_name;
            const version = currentTag.startsWith('v') ? currentTag.slice(1) : currentTag;
            const baseDownloadUrl = `https://github.com/${owner}/${repo}/releases/download/${currentTag}`;

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner,
              repo,
              per_page: 100,
            });
            const currentTagIndex = tags.findIndex((tag) => tag.name === currentTag);
            const previousTag = currentTagIndex >= 0 && currentTagIndex + 1 < tags.length
              ? tags[currentTagIndex + 1].name
              : null;
            const isFirstRelease = !previousTag;

            let zhChangeLines = [];
            let enChangeLines = [];
            let zhCompareLine = '';
            let enCompareLine = '';

            if (!isFirstRelease) {
              const generated = await github.rest.repos.generateReleaseNotes({
                owner,
                repo,
                tag_name: currentTag,
                previous_tag_name: previousTag,
              });
              const generatedBody = generated.data.body || '';
              const prLines = generatedBody
                .split('\n')
                .map((line) => line.trim())
                .filter((line) => /^[-*]\s+/.test(line) && /\/pull\/\d+/.test(line))
                .map((line) => line.replace(/^[-*]\s+/, '- '));
              zhChangeLines = prLines.length > 0 ? [...prLines] : ['- 修复问题并优化稳定性'];
              enChangeLines = prLines.length > 0 ? [...prLines] : ['- Fix issues and improve stability.'];
              zhCompareLine = `- 完整更新日志: [\`${previousTag}\`...\`${currentTag}\`](https://github.com/${owner}/${repo}/compare/${previousTag}...${currentTag})`;
              enCompareLine = `- Full Changelog: [\`${previousTag}\`...\`${currentTag}\`](https://github.com/${owner}/${repo}/compare/${previousTag}...${currentTag})`;
            }

            const winX64 = `AstrBot.Launcher_${version}_x64-setup.exe`;
            const winArm64 = `AstrBot.Launcher_${version}_arm64-setup.exe`;
            const linuxX64Rpm = `AstrBot.Launcher-${version}-1.x86_64.rpm`;
            const linuxX64Deb = `AstrBot.Launcher_${version}_amd64.deb`;
            const linuxX64AppImage = `AstrBot.Launcher_${version}_amd64.AppImage`;
            const linuxArm64Rpm = `AstrBot.Launcher-${version}-1.aarch64.rpm`;
            const linuxArm64Deb = `AstrBot.Launcher_${version}_arm64.deb`;
            const linuxArm64AppImage = `AstrBot.Launcher_${version}_aarch64.AppImage`;
            const macX64 = `AstrBot.Launcher_${version}_x64.dmg`;
            const macArm64 = `AstrBot.Launcher_${version}_aarch64.dmg`;

            function link(file) {
              return `[${file}](${baseDownloadUrl}/${file})`;
            }

            const zhDownloadLines = [
              `- Windows x64：下载 EXE 安装包 ${link(winX64)}`,
              `- Windows ARM64：下载 EXE 安装包 ${link(winArm64)}`,
              `- Debian / Ubuntu（x64）：下载 DEB 包 ${link(linuxX64Deb)}`,
              `- Fedora / openSUSE / RHEL / CentOS（x64）：下载 RPM 包 ${link(linuxX64Rpm)}`,
              `- 其他 Linux 发行版（x64，通用）：下载 AppImage ${link(linuxX64AppImage)}`,
              `- Debian / Ubuntu（ARM64）：下载 DEB 包 ${link(linuxArm64Deb)}`,
              `- Fedora / openSUSE / RHEL / CentOS（ARM64）：下载 RPM 包 ${link(linuxArm64Rpm)}`,
              `- 其他 Linux 发行版（ARM64，通用）：下载 AppImage ${link(linuxArm64AppImage)}`,
              `- macOS Intel (x64)：下载 DMG 安装包 ${link(macX64)}`,
              `- macOS Apple Silicon (ARM64)：下载 DMG 安装包 ${link(macArm64)}`,
            ];

            const enDownloadLines = [
              `- Windows x64: use EXE installer ${link(winX64)}`,
              `- Windows ARM64: use EXE installer ${link(winArm64)}`,
              `- Debian / Ubuntu (x64): use DEB package ${link(linuxX64Deb)}`,
              `- Fedora / openSUSE / RHEL / CentOS (x64): use RPM package ${link(linuxX64Rpm)}`,
              `- Other Linux distros (x64, universal): use AppImage ${link(linuxX64AppImage)}`,
              `- Debian / Ubuntu (ARM64): use DEB package ${link(linuxArm64Deb)}`,
              `- Fedora / openSUSE / RHEL / CentOS (ARM64): use RPM package ${link(linuxArm64Rpm)}`,
              `- Other Linux distros (ARM64, universal): use AppImage ${link(linuxArm64AppImage)}`,
              `- macOS Intel (x64): use DMG installer ${link(macX64)}`,
              `- macOS Apple Silicon (ARM64): use DMG installer ${link(macArm64)}`,
            ];

            const bodyLines = [];
            if (!isFirstRelease) {
              bodyLines.push(
                '## 更新内容',
                zhCompareLine,
                ...zhChangeLines,
                '',
              );
            }
            bodyLines.push(
              '## 下载建议',
              ...zhDownloadLines,
              '',
              '---',
              '',
            );
            if (!isFirstRelease) {
              bodyLines.push(
                "## What's Changed",
                enCompareLine,
                ...enChangeLines,
                '',
              );
            }
            bodyLines.push(
              '## Download Recommendations',
              ...enDownloadLines,
            );
            const body = bodyLines.join('\n');

            core.setOutput('release_body', body);
            core.info(`Prepared release body for ${currentTag}.`);

  publish-tauri:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: '--target x86_64-unknown-linux-gnu'
          - platform: 'ubuntu-22.04-arm'
            args: '--target aarch64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
          - platform: 'windows-11-arm'
            args: '--target aarch64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node cache
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch tauri conf for windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $path = "src-tauri/tauri.conf.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          if ($null -eq $json.bundle) {
            $json | Add-Member -NotePropertyName bundle -NotePropertyValue (@{})
          }
          $bin = "binaries/ctrlc_sender"
          $existing = @()
          if ($json.bundle.PSObject.Properties.Name -contains "externalBin" -and $null -ne $json.bundle.externalBin) {
            $existing = @($json.bundle.externalBin)
          }
          if ($existing -notcontains $bin) {
            $existing += $bin
          }
          if ($json.bundle.PSObject.Properties.Name -notcontains "externalBin") {
            $json.bundle | Add-Member -NotePropertyName externalBin -NotePropertyValue @()
          }
          $json.bundle.externalBin = @($existing)
          $json | ConvertTo-Json -Depth 100 | Out-File -FilePath $path -Encoding utf8NoBOM

      - name: Import Apple Developer Certificate (macOS)
        if: runner.os == 'macOS'
        id: import_apple_certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_CERTIFICATE is not configured; skipping certificate import."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -t 7200 -u "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

          signing_identities=()
          while IFS= read -r identity; do
            signing_identities+=("$identity")
          done < <(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" || true)
          if [ "${#signing_identities[@]}" -eq 0 ]; then
            echo "::error::No Developer ID Application identity found in keychain." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          if [ "${#signing_identities[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one Developer ID Application identity, found ${#signing_identities[@]}." >&2
            printf '%s\n' "${signing_identities[@]}" >&2
            exit 1
          fi
          CERT_ID=$(printf '%s\n' "${signing_identities[0]}" | awk -F'"' '{print $2}')
          if [ -z "$CERT_ID" ]; then
            echo "::error::Failed to parse Developer ID Application identity." >&2
            exit 1
          fi
          printf 'APPLE_SIGNING_IDENTITY=%s\n' "$CERT_ID" >> "$GITHUB_ENV"
          echo "Imported signing identity: $CERT_ID"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'App v__VERSION__'
          releaseBody: ${{ needs.prepare-release.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
